<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg fixed-top bg-white shadow-sm">
  <div class="container">
        <img src="images/logo2.png" alt="logo" width="150">
    <a class="navbar-brand fw-bold" href="contact.html">AfriTalent</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
      <li><a class="nav-link" href="#">Accueil</a></li>
        <li><a class="nav-link" href="#">Freelances</a></li>
        <li><a class="nav-link" href="#">Tarifs</a></li>
        <li><a class="nav-link" href="#">À propos</a></li>
        <li><a class="nav-link" href="#">Contact</a></li>
      </ul>
      <a href="contact.html" btn btn-outlinr-warning>Rejoindre AfriTalent</a>
  </nav>
  <section class="container py-5">
    <h1 class="text-center mb-5">Contactez-nous</h1>
    <div class="row">
      <div class="col-md-7">
        <form id="contactform">
          <div class="mb-3">
            <label>Nom</label>
            <input type="text" class="form-control" id="nom">
            <small class="text-danger" id="nomError"></small>
          </div>

           <div class="mb-3">
            <label>Prenom</label>
            <input type="text" class="form-control" id="prenom">
            <small class="text-danger" id="prenomError"></small>
          </div>

           <div class="mb-3">
            <label>Email</label>
            <input type="text" class="form-control" id="nom">
            <small class="text-danger" id="emailError"></small>
          </div>

          <div class="mb-3">
            <label>Sujet</label>
            <select class="form-select" id="sujet">
              <option value="">Choisir un sujet</option>
              <option>Support</option>
              <option>Partenaire</option>
              <option>Information</option>
            </select>
            <small class="text-danger" id="sujetError"></small>
          </div>

          <div class="mb-3">
            <label>Message</label>
            <textarea class="form-control" rows="5" id="message"></textarea>
            <small class="text-danger" id="messageError"></small>
          </div>

          <button type="submit" class="btn btn-primary">Envoyer</button>

          <div id="successMessage" class="alert alert-success mt-3 d-none">
            Message envoyé avec succés
          </div>

        </form>

      </div>

      <!-- information droite -->
       <div class="col-md-5">
        <div class="card p-4 shadow-sm">
          <h4>Information</h4>
          <p><strong>Email:</strong><br>contact@afritalent.com</p>
          <p><strong>Telephone:</strong><br>76 610 71 28</p>
          <p><strong>Adresse:</strong><br>Dakar , Sénégal</p>
        </div>

       </div>

    </div>
  </section>
<!-- GOOGLE MAPS -->
 <section class="container pb-5">

  <iframe src="https://www.google.com/maps/embed?pb=!1m18..."
  width="100%"
  height="350"
  style="border: 0;"
  allowfullscreen=""
  loading="lazy">

  </iframe>

 </section>


 <!-- js -->
  <script>

document.getElementById("contactForm")
.addEventListener("submit", function(e){

e.preventDefault();

let valid = true;

let nom = document.getElementById("nom").value.trim();
let prenom = document.getElementById("prenom").value.trim();
let email = document.getElementById("email").value.trim();
let sujet = document.getElementById("sujet").value;
let message = document.getElementById("message").value.trim();

document.getElementById("nomError").innerText = "";
document.getElementById("prenomError").innerText = "";
document.getElementById("emailError").innerText = "";
document.getElementById("sujetError").innerText = "";
document.getElementById("messageError").innerText = "";

if(nom === ""){
document.getElementById("nomError").innerText =
"Le nom est obligatoire";
valid = false;
}

if(prenom === ""){
document.getElementById("prenomError").innerText =
"Le prénom est obligatoire";
valid = false;
}

let emailRegex = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

if(!email.match(emailRegex)){
document.getElementById("emailError").innerText =
"Email invalide";
valid = false;
}

if(sujet === ""){
document.getElementById("sujetError").innerText =
"Choisissez un sujet";
valid = false;
}

if(message.length < 20){
document.getElementById("messageError").innerText =
"Le message doit contenir au moins 20 caractères";
valid = false;
}

if(valid){
document.getElementById("successMessage")
.classList.remove("d-none");

document.getElementById("contactForm").reset();
}

});

</script>

  </div>
</footer>
 
</body>
</html>
